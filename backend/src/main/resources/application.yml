spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fyp_tracker}
    username: ${DB_USER:fyp_user}
    password: ${DB_PASS:fyp_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: ${MAIL_PORT:465}
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:9191}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:${MAIL_USER:noreply@auca.ac.rw}}

  prototype-api:
    base-url: ${PROTO_API_URL:http://stub}
    enabled: ${PROTO_API_ENABLED:false}

management:
  endpoint:
    health:
      show-details: when-authorized
      roles: SUPERADMIN
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

logging:
  level:
    rw.aauca.fyp: INFO
    org.springframework.security: WARN
