spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fyp_tracker}
    username: ${DB_USER:fyp_user}
    password: ${DB_PASS:fyp_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:fyp-tracker-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000   # 24 hours

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  prototype-api:
    base-url: ${PROTO_API_URL:http://stub}
    enabled: ${PROTO_API_ENABLED:false}

logging:
  level:
    rw.aauca.fyp: DEBUG
    org.springframework.security: INFO
